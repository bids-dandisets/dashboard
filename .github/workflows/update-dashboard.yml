name: Update dashboard

on:
  schedule:
    - cron: "0 11 * * *"  # 7am eastern time
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to clone and push updates to"
        required: false
        default: "main"
  push:
    branches:
      - "copilot/**"

env:
  GITHUB_TOKEN: ${{ secrets._GITHUB_API_KEY }}

jobs:
  UpdateBidsDandisetsDashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Set target branch
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "TARGET_BRANCH=${{ github.ref_name }}" >> $GITHUB_ENV
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TARGET_BRANCH=${{ inputs.branch }}" >> $GITHUB_ENV
          else
            echo "TARGET_BRANCH=main" >> $GITHUB_ENV
          fi

      - name: Clone repo
        run: git clone --branch $TARGET_BRANCH https://x-access-token:${{ secrets._GITHUB_API_KEY }}@github.com/bids-dandisets/dashboard.git

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.13
      - name: Install dependencies
        run: pip install dandi tabulate2 tqdm

      - name: Run dashboard update
        run: python dashboard/scripts/update_dashboard.py

      - name: Upload changes
        run: |
          cd dashboard
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit --message "update" || true  # || true in case of no changes
          git push origin HEAD:$TARGET_BRANCH

  NotifyOnFailure:
    runs-on: ubuntu-latest
    needs: [ UpdateBidsDandisetsDashboard ]
    if: ${{ always() && needs.UpdateBidsDandisetsDashboard.result == 'failure' }}
    steps:
      - uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "CI Failure: BIDS-Dandisets Dashboard Update"
          to: cody.c.baker.phd@gmail.com  # Add more with comma separation (no spaces)
          from: bids-dandisets
          body: "Please check the latest run of the BIDS-Dandisets Dashboard update: https://github.com/bids-dandisets/dashboard/actions/workflows/update-dashboard.yml"
